<button id="theme-toggle" type="button"
    class="inline-flex h-8 w-8 items-center justify-center bg-secondary/20 hover:bg-secondary/50 rounded transition-none shrink-0 cursor-pointer"
    aria-label="Tema">
    <img id="theme-toggle-icon" src="{{ url_for('static', filename='svg/darkmode.svg') }}" alt="Tema"
        class="h-5 w-5 opacity-70">
</button>
<script>
const root = document.documentElement;
const storedTheme = localStorage.getItem("theme");
function setInitialTheme() {
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const theme = storedTheme || (prefersDark ? "dark" : "light");
  if (theme === "dark") {
    root.classList.add("dark");
  } else {
    root.classList.remove("dark");
  }
  localStorage.setItem("theme", theme);
}
function setupThemeToggle() {
  const themeToggle = document.getElementById("theme-toggle");
  if (!themeToggle) {
    return;
  }
  themeToggle.addEventListener("click", () => {
    const isDark = root.classList.toggle("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
}
setInitialTheme();
window.addEventListener("DOMContentLoaded", setupThemeToggle);
</script>
